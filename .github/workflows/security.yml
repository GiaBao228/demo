name: Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v2
        with:
          languages: python
      - uses: github/codeql-action/autobuild@v2
      - uses: github/codeql-action/analyze@v2

  bandit:
    runs-on: ubuntu-latest
    needs: codeql
    steps:
      - uses: actions/checkout@v4
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: |
          bandit -r . -f sarif -o bandit.sarif || true
      - name: Upload Bandit SARIF
        uses: github/code-scanning/sarif-upload@v2
        with:
          sarif_file: bandit.sarif

  pip_audit:
    runs-on: ubuntu-latest
    needs: bandit
    steps:
      - uses: actions/checkout@v4
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: |
          pip-audit -o pip-audit.json --format json || true
      - uses: actions/upload-artifact@v4
        with:
          name: pip-audit
          path: pip-audit.json

  semgrep:
    runs-on: ubuntu-latest
    needs: pip_audit
    steps:
      - uses: actions/checkout@v4
      - name: Install semgrep
        run: pip install semgrep
      - name: Run semgrep
        run: |
          semgrep --config=p/ci --json --output semgrep-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json

  dast_zap:
    runs-on: ubuntu-latest
    needs: semgrep
    services:
      docker:
        image: docker:24-dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Build and start app (docker)
        run: |
          docker build -t vuln-app-pro .
          docker run -d --name vuln-app -p 5000:5000 vuln-app-pro
          sleep 5
      - name: Run ZAP Baseline Scan (docker)
        run: |
          docker run -t --rm -v $(pwd):/zap/wrk/:rw ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://host.docker.internal:5000 -r zap_report.html || true
      - name: Upload zap report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report.html
