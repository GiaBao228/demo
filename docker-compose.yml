version: "3.8"
services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 3
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command: ["zap.sh", "-daemon", "-port", "8080", "-host", "0.0.0.0"]
    ports:
      - "8080:8080"
